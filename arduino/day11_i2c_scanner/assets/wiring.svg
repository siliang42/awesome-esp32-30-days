  <text x="736" y="297" font-size="16" font-weight="800" fill="#18231f">OLED SCL</text>
  <text x="736" y="316" font-size="13" fill="#66736d">I2C 时钟 · 运行扫描器找地址。</text>
  <text x="80" y="305" font-size="15" font-weight="800" fill="#fffaf0">GPIO22</text>
