  <text x="736" y="258" font-size="13" fill="#66736d">I2C 数据 · 可改但代码要同步。</text>
  <text x="80" y="247" font-size="15" font-weight="800" fill="#fffaf0">GPIO21</text>
  <path d="M 316 300 C 450 300, 520 300, 696 300" fill="none" stroke="#38a169" stroke-width="4"/>
